name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o slackseek-${{ matrix.goos }}-${{ matrix.goarch }} \
            .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: slackseek-${{ matrix.goos }}-${{ matrix.goarch }}
